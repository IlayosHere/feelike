version: 2

updates:
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "chore(deps)"
